# ---------------------------------------------------------------------------
# default_rules.yaml — Human-readable catalogue of all built-in rules
#
# This file serves as living documentation.  The actual detection logic
# lives in Python rule classes, but this YAML provides a quick-reference
# catalogue that can be shown in the README, rendered in docs, or loaded
# at runtime if we ever want configurable rule metadata.
# ---------------------------------------------------------------------------

rules:

  - id: NON_LOCALHOST_BIND
    category: NON_LOCALHOST_BIND
    severity: high
    description: >
      Detects services configured to bind to 0.0.0.0, ::, or other
      non-loopback addresses, expanding network exposure.
    why_it_matters: >
      Binding to a wildcard or public address makes the service reachable
      from any network interface, vastly expanding the attack surface.
    recommendation: >
      Bind services to 127.0.0.1 (or ::1) unless external access is
      explicitly required and protected by additional controls.

  - id: TRUSTED_PROXY_ENABLED
    category: TRUSTED_PROXY_ENABLED
    severity: medium
    description: >
      Detects configurations enabling trusted-proxy or forwarded-header
      trust, which may allow IP spoofing.
    why_it_matters: >
      When a service blindly trusts X-Forwarded-For or similar headers,
      an attacker can spoof their source IP or bypass IP-based ACLs.
    recommendation: >
      Only enable trusted-proxy mode when behind a verified reverse proxy.
      Restrict trusted proxy IPs to the minimum set.

  - id: API_EXPOSURE
    category: API_EXPOSURE
    severity: medium
    description: >
      Detects HTTP API, REST endpoint, or web-server configuration that
      may expose orchestration interfaces.
    why_it_matters: >
      Exposed APIs may allow unauthenticated access to orchestration
      actions, agent management, or data retrieval endpoints.
    recommendation: >
      Restrict API listeners to localhost or authenticated-only access.
      Use API keys, OAuth, or mutual TLS.

  - id: EXPOSED_ADMIN_SURFACE
    category: EXPOSED_ADMIN_SURFACE
    severity: high
    description: >
      Detects configuration of admin dashboards or management UIs that
      may be accessible beyond localhost.
    why_it_matters: >
      Admin interfaces often control agents, tools, sessions, or
      orchestration logic.  Public exposure greatly increases risk.
    recommendation: >
      Restrict admin interfaces to localhost.  Require strong authentication
      and consider placing behind a VPN.

  - id: SHARED_AGENT_HIGH_PRIV
    category: SHARED_AGENT_HIGH_PRIV
    severity: critical
    description: >
      Detects shared agents with elevated privileges that may serve as
      a cross-tenant pivot.
    why_it_matters: >
      A shared agent with high privileges is a single point of compromise
      that can affect multiple users or workspaces.
    recommendation: >
      Avoid sharing privileged agents across tenants.  Use per-tenant agent
      instances with the minimum required capabilities.

  - id: PLUGIN_TRUST_RISK
    category: PLUGIN_TRUST_RISK
    severity: high
    description: >
      Detects plugin directories, dynamic code loading, or extension
      registration that may allow untrusted code execution.
    why_it_matters: >
      Plugins that run in-process without sandboxing inherit the full
      privileges of the host.  A malicious plugin can access secrets.
    recommendation: >
      Run plugins in isolated sandboxes or containers.  Validate plugin
      signatures.  Restrict plugin filesystem and network access.

  - id: WEAK_AGENT_ISOLATION
    category: WEAK_AGENT_ISOLATION
    severity: high
    description: >
      Detects shared workspace directories or absence of container/sandbox
      isolation between agents.
    why_it_matters: >
      Shared workspace directories let one agent read or tamper with
      another agent's data, tools, or credentials.
    recommendation: >
      Give each agent a dedicated workspace directory.  Consider running
      agents in separate containers with read-only root filesystems.

  - id: WORKSPACE_PATH_RISK
    category: WORKSPACE_PATH_RISK
    severity: medium
    description: >
      Detects workspace or data-directory paths that are overly broad or
      use parent-directory traversal.
    why_it_matters: >
      Overly broad workspace paths may expose sensitive host files to
      agents.
    recommendation: >
      Restrict workspace paths to a narrow, dedicated directory.  Avoid
      root or home-directory mounts.

  - id: NODE_COMMAND_SURFACE
    category: NODE_COMMAND_SURFACE
    severity: high
    description: >
      Detects node/device registration or remote command-dispatch
      configuration that may expand the attack surface.
    why_it_matters: >
      Remote command surfaces let the orchestration layer execute actions
      on edge devices.  Improper auth may allow lateral movement.
    recommendation: >
      Require mutual TLS or strong API-key authentication for node
      communication.  Implement per-node command allow-lists.

  - id: TOKEN_STORAGE_RISK
    category: TOKEN_STORAGE_RISK
    severity: critical
    description: >
      Detects API tokens, passwords, or secret-like values stored in
      plaintext configuration files.
    why_it_matters: >
      Plaintext secrets in config files are trivially extractable if the
      repo is leaked, if file permissions are too broad, or if backups
      are not encrypted.
    recommendation: >
      Store secrets in a dedicated secrets manager.  Use environment
      variable references instead of hard-coded values.

  - id: EXECUTION_SURFACE
    category: EXECUTION_SURFACE
    severity: critical
    description: >
      Detects broad code-execution capabilities such as subprocess, eval,
      exec, or shell command access.
    why_it_matters: >
      Execution primitives are the most dangerous capabilities an
      orchestration system can expose.
    recommendation: >
      Restrict execution to a vetted allow-list.  Run exec-capable agents
      in hardened, resource-limited containers.

  - id: BROAD_FILESYSTEM_ACCESS
    category: BROAD_FILESYSTEM_ACCESS
    severity: high
    description: >
      Detects host-path volume mounts or broad filesystem access patterns
      that break container isolation.
    why_it_matters: >
      Host mounts break container isolation and may expose sensitive data,
      credentials, or system files.
    recommendation: >
      Minimise host-path mounts.  Prefer named volumes with narrow scope.
      Use read-only mounts where possible.

  - id: UNRESTRICTED_TOOLING
    category: UNRESTRICTED_TOOLING
    severity: high
    description: >
      Detects tool-access configuration that grants agents a wide or
      unrestricted set of capabilities without approval gates.
    why_it_matters: >
      Without per-tool approval, a rogue agent can abuse the entire tool
      surface including web browsing, file access, and email.
    recommendation: >
      Implement per-tool approval policies.  Use role-based access control
      to restrict which agents can invoke which tools.

  - id: POTENTIAL_SECRET_IN_CONFIG
    category: POTENTIAL_SECRET_IN_CONFIG
    severity: low
    description: >
      Flags configuration keys whose names suggest they may hold secrets,
      even if the value is not obviously high-entropy.
    why_it_matters: >
      Even low-entropy passwords or placeholder tokens may end up in
      production configs.
    recommendation: >
      Review flagged keys and ensure their values are not real credentials.
      Consider using environment-variable references.
