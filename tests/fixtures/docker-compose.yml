# Sample docker-compose for testing volume/mount detection
version: "3.8"

services:
  gateway:
    image: openclaw/gateway:latest
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host-root:ro
    environment:
      - BIND_ADDRESS=0.0.0.0

  agent:
    image: openclaw/agent:latest
    volumes:
      - shared-workspace:/workspace
      - /tmp:/tmp
    environment:
      - SHARED_AGENT=true
      - TOOL_ACCESS=all

volumes:
  shared-workspace:
